name: XAUUSD SMC Bot

on:
  schedule:
    # 14:00-22:00 GMT+7 = 07:00-15:00 UTC ทุกชั่วโมงตรง
    - cron: '0 7,8,9,10,11,12,13,14,15 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas numpy -q
      - run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
